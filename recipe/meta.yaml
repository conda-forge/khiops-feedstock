{% set name = "khiops" %}
{% set version = "11.0.1.0rc.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://test-files.pythonhosted.org/packages/d8/9c/2d11fe7aae35e3d6ab8cf9eeaca20c8a39bbc9b33591521a177d9f6f48c6/{{ name }}-{{ version.replace("rc.2", "rc2") }}.tar.gz
  sha256: 7cdc6aa58e1512856fc3b8d07d02c2bd0e3569e2d6b1518982fb852dcb48bfa5

build:
  entry_points:
    - kh-status=khiops.tools:kh_status_entry_point
    - kh-samples=khiops.tools:kh_samples_entry_point
    - kh-download-datasets=khiops.tools:kh_download_datasets_entry_point
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir --no-build-isolation -vvv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - khiops-core =11.0.1rc.2
    - pandas >=2.3.3,<4.0.0
    - scikit-learn >=1.7.2,<1.9.0
  run_constrained:
    # do not necessary use the latest version
    # to avoid undesired breaking changes
    - boto3 >=1.17.39,<=1.35.69
    - google-cloud-storage >=1.37.0

test:
  imports:
    - khiops
  commands:
    # disable the old 'pip check' to avoid a failure because the project dependencies are missing
    - kh-status
    - kh-samples --help
    - kh-download-datasets --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://khiops.org
  summary: Python library for the Khiops AutoML suite
  license: BSD-3-Clause
  license_file: LICENSE.md
  doc_url: https://khiops.org
  dev_url: https://github.com/khiopsml/khiops-python

extra:
  recipe-maintainers:
    - popescu-v
    - tramora
    - bruno-at-orange
